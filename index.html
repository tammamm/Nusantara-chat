<!doctype html>
<html>
  <head>
    <title>Nusantara Chat</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
      body { margin: 0; font-family: Arial; display: flex; flex-direction: column; height: 100vh; }
      #messages { list-style-type: none; margin: 0; padding: 10px; flex-grow: 1; overflow-y: auto; }
      #messages li { padding: 5px 10px; }
      #form { display: flex; padding: 10px; background: #eee; }
      #input { flex-grow: 1; border: none; padding: 10px; font-size: 16px; }
      #form button { border: none; padding: 10px; background: #0084ff; color: white; }
    </style>
  </head>
  <body>
    <ul id="messages"></ul>
    <form id="form" action="">
      <input id="input" autocomplete="off" placeholder="Ketik pesan..." /><button>Kirim</button>
    </form>
    <script src="/socket.io/socket.io.js"></script>
    <script>
      var socket = io();
      var form = document.getElementById('form');
      var input = document.getElementById('input');
      var messages = document.getElementById('messages');

      form.addEventListener('submit', function(e) {
        e.preventDefault();
        if (input.value) {
          socket.emit('chat message', input.value);
          input.value = '';
        }
      });

      socket.on('chat message', function(msg) {
        var item = document.createElement('li');
        item.textContent = msg;
        messages.appendChild(item);
        messages.scrollTop = messages.scrollHeight;
      });
    </script>
  </body>
</html>
